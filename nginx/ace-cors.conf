server {
    listen 80;
    server_name _;

    # Eliminar headers CORS que manda AceStream
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    # CORS abierto 
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Range" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        return 204;
    }

    # Health check del frontend
    location = /health {
        proxy_pass         http://acestream:6878/webui/api/service?method=get_version;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    # Manifest M3U8 — proxy directo + sub_filter
    location /ace/manifest.m3u8 {
        proxy_pass         http://acestream:6878;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Accept-Encoding "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
        proxy_cache        off;

        sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain;
        sub_filter       'http://127.0.0.1:6878' '';
        sub_filter       'http://acestream:6878'  '';
        sub_filter       'http://localhost:6878'  '';
        sub_filter_once  off;
    }

    # API interna del stream — proxy directo + sub_filter
    location /ace/getstream {
        proxy_pass         http://acestream:6878;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Accept-Encoding "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
        proxy_cache        off;

        sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain;
        sub_filter       'http://127.0.0.1:6878' '';
        sub_filter       'http://acestream:6878'  '';
        sub_filter       'http://localhost:6878'  '';
        sub_filter_once  off;
    }

    # Chunks de video
    location /content/ {
        proxy_pass            http://acestream:6878;
        proxy_http_version    1.1;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    300s;
        proxy_set_header      Host $host;
    }

    # WebUI y API de AceStream
    location /webui/ {
        proxy_pass         http://acestream:6878;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    # Catch-all
    location /ace/ {
        proxy_pass         http://acestream:6878;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }
}