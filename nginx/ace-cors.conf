# nginx/ace-cors.conf
# NUEVO archivo — proxy CORS para AceStream
# Traduce peticiones HTTP al motor AceStream (puerto 6878)
# e inyecta Access-Control-Allow-Origin para GitHub Pages

server {
    listen 80;

    # Headers CORS para todas las respuestas
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

    # Preflight OPTIONS
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Proxy al motor AceStream
    location / {
        proxy_pass         http://acestream:6878;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Health check para que la UI pueda detectar si el motor está activo
    location /health {
        proxy_pass http://acestream:6878/webui/api/service?method=get_version;
        proxy_read_timeout 5s;
    }
}