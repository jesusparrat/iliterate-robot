# nginx/ace-cors.conf
# Cambios respecto a versión anterior:
#   - sub_filter ya NO reemplaza ciegamente http:// → https:// en todo el body
#     (esto rompía URLs de chunks /content/ que deben mantenerse relativas)
#   - Se añade sub_filter quirúrgico solo para el manifest .m3u8 (reescribe /content/ paths)
#   - Se añade location específica para /content/ con buffering off (stream de video)
#   - Se añade /webui/api/service para el health-check del frontend

server {
    listen 80;
    server_name _;

    # Eliminar headers CORS que manda AceStream (los reescribimos nosotros)
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    # CORS abierto — solo para uso privado/familiar
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Range" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        return 204;
    }

    # Health check del frontend (app.js llama a /health para validar el motor)
    location = /health {
        proxy_pass         http://acestream:6878/webui/api/service?method=get_version;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    # Manifest M3U8 — reescribir URLs internas para que el player las pida a nginx
    # en lugar de a 127.0.0.1:6878 directamente (que no es accesible desde el browser)
    location ~ ^/ace/(manifest\.m3u8|getstream) {
        proxy_pass         http://acestream:6878/ace/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Accept-Encoding "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
        proxy_cache        off;

        # Reescribir solo las URLs absolutas de AceStream dentro del M3U8
        sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain;
        sub_filter       'http://127.0.0.1:6878' '';
        sub_filter       'http://acestream:6878'  '';
        sub_filter       'http://localhost:6878'  '';
        sub_filter_once  off;
    }

    # Chunks de video — sin buffering para streaming en tiempo real
    location /content/ {
        proxy_pass            http://acestream:6878/content/;
        proxy_http_version    1.1;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    300s;
        proxy_set_header      Host $host;
    }

    # WebUI y API de AceStream (para debug / webui/api/service)
    location /webui/ {
        proxy_pass         http://acestream:6878/webui/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    # Catch-all: resto de rutas de AceStream
    location /ace/ {
        proxy_pass         http://acestream:6878/ace/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }
}