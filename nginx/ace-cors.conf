server {
    listen 80;
    server_name _;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    add_header Access-Control-Allow-Origin  "*"                     always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS"          always;
    add_header Access-Control-Allow-Headers "Content-Type, Range"   always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /health {
        proxy_pass         http://acestream:6878/webui/api/service?method=get_version;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass         http://acestream:6878;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 300s;

        # BUG A FIX: $scheme es siempre "http" porque cloudflared habla HTTP a nginx.
        # Hardcodeamos "https://" para que el Location del redirect salga correcto.
        proxy_redirect ~*^http://[^/]+(:[0-9]+)?(/.+)$ https://$host$2;

        # BUG B FIX: las URLs dentro del M3U8 también son http://.
        # sub_filter reescribe el body antes de enviarlo al browser.
        sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain;
        sub_filter       'http://'  'https://';
        sub_filter_once  off;

        # Necesario para que sub_filter funcione con respuestas comprimidas
        proxy_set_header Accept-Encoding "";
    }
}