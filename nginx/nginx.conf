worker_processes 1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }

    location /ace/ {
      proxy_pass            http://acestream:6878/ace/;
      proxy_http_version    1.1;
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    300s;
      proxy_connect_timeout 10s;

      # ─── FIX CRÍTICO ────────────────────────────────────────────────────────
      # AceStream devuelve 302 → http://127.0.0.1:6878/ace/...
      # nginx reescribe esos Location headers a URLs relativas (/ace/...)
      # El browser las resuelve como https://tunnel.trycloudflare.com/ace/...  ✅
      proxy_redirect http://acestream:6878/   /;
      proxy_redirect http://127.0.0.1:6878/   /;
      proxy_redirect http://localhost:6878/    /;

      # Reescribe URLs absolutas internas dentro del contenido m3u8
      proxy_set_header Accept-Encoding "";
      sub_filter 'http://127.0.0.1:6878/'  '/';
      sub_filter 'http://acestream:6878/'  '/';
      sub_filter 'http://localhost:6878/'  '/';
      sub_filter_once off;
      sub_filter_types
        text/plain
        application/vnd.apple.mpegurl
        application/x-mpegurl;
      # ────────────────────────────────────────────────────────────────────────

      add_header Access-Control-Allow-Origin  * always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Range, Content-Type" always;

      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Content-Length 0;
        return 204;
      }
    }

    location /webui/ {
      proxy_pass            http://acestream:6878/webui/;
      proxy_http_version    1.1;
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    60s;
      add_header Access-Control-Allow-Origin * always;
    }
  }
}