worker_processes 1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  map $http_x_forwarded_proto $real_scheme {
    default  $scheme;
    https    https;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }

    location /ace/ {
      proxy_pass            http://acestream:6878/ace/;
      proxy_http_version    1.1;
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    300s;
      proxy_connect_timeout 10s;

      # FIX 1: forzamos Host a localhost para que AceStream genere redirects
      # a http://127.0.0.1:6878/ en lugar de usar el host del tunnel + :6878
      proxy_set_header Host              localhost;
      proxy_set_header X-Forwarded-Proto $real_scheme;

      # FIX 2: reescribe TODOS los patrones posibles de redirect de AceStream
      # patrón fijo (lo que AceStream genera cuando recibe Host: localhost)
      proxy_redirect http://127.0.0.1:6878/ $real_scheme://$http_host/;
      proxy_redirect http://acestream:6878/  $real_scheme://$http_host/;
      proxy_redirect http://localhost:6878/  $real_scheme://$http_host/;
      # patrón regex: captura cualquier host:6878 que AceStream pueda generar
      proxy_redirect ~^http://[^/]+:6878/(.*)$ $real_scheme://$http_host/$1;

      proxy_set_header Accept-Encoding "";
      sub_filter 'http://127.0.0.1:6878/' '/';
      sub_filter 'http://acestream:6878/'  '/';
      sub_filter 'http://localhost:6878/'  '/';
      sub_filter_once off;
      sub_filter_types text/plain application/vnd.apple.mpegurl application/x-mpegurl;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;

      add_header Access-Control-Allow-Origin  * always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Range, Content-Type" always;

      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Content-Length 0;
        return 204;
      }
    }

    location /webui/ {
      proxy_pass            http://acestream:6878/webui/;
      proxy_http_version    1.1;
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    60s;
      proxy_set_header Host localhost;
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin * always;
    }
  }
}