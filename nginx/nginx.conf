worker_processes 1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }

    location /ace/ {
      proxy_pass            http://acestream:6878/ace/;
      proxy_http_version    1.1;
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    300s;
      proxy_connect_timeout 10s;

      # Reescribe redirects 302 internos de AceStream a rutas relativas
      proxy_redirect http://acestream:6878/ /;
      proxy_redirect http://127.0.0.1:6878/ /;
      proxy_redirect http://localhost:6878/  /;

      # Reescribe URLs absolutas dentro del contenido .m3u8
      proxy_set_header Accept-Encoding "";
      sub_filter 'http://127.0.0.1:6878/' '/';
      sub_filter 'http://acestream:6878/'  '/';
      sub_filter 'http://localhost:6878/'  '/';
      sub_filter_once off;
      sub_filter_types text/plain application/vnd.apple.mpegurl application/x-mpegurl;

      # ── CORS ────────────────────────────────────────────────────────────────
      # Eliminamos los headers CORS que viene de AceStream upstream.
      # NO añadimos los nuestros: Cloudflare Tunnel añade automáticamente
      # Access-Control-Allow-Origin: * en su edge. Si nginx añadiera también
      # el suyo, el browser recibiría dos valores y bloquearía la petición.
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Expose-Headers;
      # ────────────────────────────────────────────────────────────────────────
    }

    location /webui/ {
      proxy_pass            http://acestream:6878/webui/;
      proxy_http_version    1.1;
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    60s;
      proxy_hide_header     Access-Control-Allow-Origin;
    }
  }
}