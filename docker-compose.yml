services:
  acestream:
    image: martinbjeldbak/acestream-http-proxy:latest
    restart: unless-stopped
    ports:
      - "6878:6878"
    volumes:
      - acestream-data:/root/.ACEStream
    networks:
      - ace-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6878/webui/api/service?method=get_version"]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 30s

  ace-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      acestream:
        condition: service_healthy
    networks:
      - ace-net
    command: >
      /bin/sh -c "echo '
      server {
          listen 80;
          
          # Eliminar CORS de origen
          proxy_hide_header Access-Control-Allow-Origin;
          
          # Todo el tráfico se procesa por aquí
          location / {
              add_header Access-Control-Allow-Origin \"*\" always;
              proxy_pass http://acestream:6878;
              proxy_http_version 1.1;
              proxy_set_header Accept-Encoding \"\";
              proxy_set_header Host $$host;
              
              # LA PODA NUCLEAR:
              # Reemplazamos cualquier URL devuelta por AceStream para quitar HTTP y el puerto 6878
              sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain text/html application/json;
              sub_filter \"http://$$host:6878\" \"https://$$host\";
              sub_filter \"http://127.0.0.1:6878\" \"https://$$host\";
              sub_filter \"http://localhost:6878\" \"https://$$host\";
              sub_filter \"http://acestream:6878\" \"https://$$host\";
              sub_filter_once off;
          }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

volumes:
  acestream-data:

networks:
  ace-net:
    driver: bridge