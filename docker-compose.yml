services:
  acestream:
    image: martinbjeldbak/acestream-http-proxy:latest
    restart: unless-stopped
    ports:
      - "6878:6878"
    volumes:
      - acestream-data:/root/.ACEStream
    networks:
      - ace-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6878/webui/api/service?method=get_version"]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 30s

  ace-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      acestream:
        condition: service_healthy
    networks:
      - ace-net
    command: >
      /bin/sh -c "echo '
      server {
          listen 80;
          
          # Headers CORS universales devueltos en CUALQUIER peticion
          add_header Access-Control-Allow-Origin \"*\" always;
          add_header Access-Control-Allow-Methods \"GET, POST, OPTIONS, HEAD\" always;
          add_header Access-Control-Allow-Headers \"Origin, X-Requested-With, Content-Type, Accept, Range\" always;
          add_header Access-Control-Expose-Headers \"Content-Length, Content-Range\" always;
          
          # Quitar los headers cors propios del acestream para que no choquen
          proxy_hide_header Access-Control-Allow-Origin;
          proxy_hide_header Access-Control-Allow-Methods;
          proxy_hide_header Access-Control-Allow-Headers;
          proxy_hide_header Access-Control-Expose-Headers;

          location /health {
              if ($$request_method = OPTIONS) {
                  return 204;
              }
              proxy_pass http://acestream:6878/webui/api/service?method=get_version;
              proxy_http_version 1.1;
          }
          
          location / {
              if ($$request_method = OPTIONS) {
                  return 204;
              }
              
              proxy_pass http://acestream:6878;
              proxy_http_version 1.1;
              proxy_set_header Accept-Encoding \"\";
              proxy_set_header Host $$host;
              
              # REESCRITURA MAGICA DE REDIRECCIONES 301/302 DE ACESTREAM
              proxy_redirect ~^http://[^/]+:6878(/.*)$$ https://$$host$$1;
              proxy_redirect ~^http://[^/]+(/.*)$$ https://$$host$$1;
              
              # REESCRITURA DE M3U8 y PLAYLISTS
              sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl text/plain text/html application/json;
              sub_filter \"http://$$host:6878\" \"https://$$host\";
              sub_filter \"http://$$host\" \"https://$$host\";
              sub_filter \"http://127.0.0.1:6878\" \"https://$$host\";
              sub_filter \"http://localhost:6878\" \"https://$$host\";
              sub_filter \"http://acestream:6878\" \"https://$$host\";
              sub_filter_once off;
          }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

volumes:
  acestream-data:

networks:
  ace-net:
    driver: bridge