services:

  acestream:
    # martinbjeldbak/acestream-http-proxy: proxy HTTP nativo para AceStream
    # Actualizado octubre 2025 — versión de engine actual
    # Diseñado exactamente para usarse como proxy HTTP detrás de un reverse proxy
    image: martinbjeldbak/acestream-http-proxy:latest
    restart: unless-stopped
    ports:
      - "6878:6878"
    volumes:
      # Persiste la caché del motor entre reinicios (acelera streams siguientes)
      - acestream-data:/root/.ACEStream
    networks:
      - ace-net

  ace-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/ace-cors.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - acestream
    networks:
      - ace-net

volumes:
  acestream-data:

networks:
  ace-net:
    driver: bridge