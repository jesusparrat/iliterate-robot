services:

  acestream:
    image: magnetikonline/acestream-server:latest
    # CAMBIO: --allow-remoteaccess hace que el motor escuche en 0.0.0.0
    # en lugar de solo 127.0.0.1, necesario para que nginx lo alcance
    # por la red interna Docker (acestream:6878)
    command: /start-engine --client-console --allow-remoteaccess
    restart: unless-stopped
    ports:
      - "6878:6878"
    networks:
      - ace-net

  ace-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/ace-cors.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - acestream
    networks:
      - ace-net

networks:
  ace-net:
    driver: bridge