# iliterate-robot — Docker Compose v2
# Cambios respecto a versión anterior:
#   - Indentación YAML corregida (el original tenía servicios sin sangría, rompía el parse)
#   - Se añade healthcheck al servicio acestream para que nginx espere a que esté listo
#   - Se mapea el volumen de nginx correctamente con ruta relativa ./nginx/
#   - Se añade condición de depends_on con service_healthy para ace-proxy

services:
  acestream:
    image: martinbjeldbak/acestream-http-proxy:latest
    restart: unless-stopped
    ports:
      - "6878:6878"
    volumes:
      - acestream-data:/root/.ACEStream
    networks:
      - ace-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6878/webui/api/service?method=get_version"]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 30s

  ace-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/ace-cors.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      acestream:
        condition: service_healthy
    networks:
      - ace-net

volumes:
  acestream-data:

networks:
  ace-net:
    driver: bridge