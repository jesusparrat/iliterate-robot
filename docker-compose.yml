# docker-compose.yml
# CAMBIO respecto a la versión anterior:
# - Usa la imagen pública de magnetikonline/docker-acestream-server
#   en lugar del Dockerfile rudimentario propio
# - Añade un proxy nginx que inyecta CORS headers
#   (necesario para llamadas desde GitHub Pages a través del túnel)
# - Puerto 8080 expuesto al host (cloudflared apunta a este puerto)

services:

  # Motor AceStream — imagen pública, ya probada y funcional
  acestream:
    image: magnetikonline/acestream-server:latest
    # Si la imagen no está en Docker Hub, construirla localmente:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.ace
    restart: unless-stopped
    ports:
      - "6878:6878"   # API HTTP nativa de AceStream
    networks:
      - ace-net

  # Proxy nginx: traduce localhost:8080 → acestream:6878
  # e inyecta CORS headers para que funcione desde GitHub Pages
  ace-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"     # cloudflared apunta aquí
    volumes:
      - ./nginx/ace-cors.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - acestream
    networks:
      - ace-net

networks:
  ace-net:
    driver: bridge