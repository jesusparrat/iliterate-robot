services:
  acestream:
    image: jopsis/aceserve:latest
    container_name: acestream
    restart: unless-stopped
    ports:
      - "6878:6878"

  nginx:
    image: nginx:alpine
    container_name: iliterate-robot-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - acestream